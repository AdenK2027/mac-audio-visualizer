<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waveform</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&display=swap" rel="stylesheet">
</head>
<body>
    <div id="hud">
        <span id="hud-paused" class="hidden">PAUSED — CLICK TO ENABLE AUDIO</span>
    </div>
    <div id="controls">
        <button id="btn-prev">« -5s</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-next">+5s »</button>
    </div>
    <div id="show-tabs">
        <button id="show-tabs-btn">Hide Tabs</button>
    </div>

    <div id="tab-bar">
        <!-- Input tab -->
        <div class="tab-group" id="group-input">
        <button class="tab-btn" id="tab-input">
            INPUT <span class="chevron">▲</span>
        </button>
        <div class="tray" id="tray-input">
            <button class="tray-btn active" id="btn-mic">MIC</button>
            <button class="tray-btn" id="btn-mp3">MP3</button>
        </div>
        </div>

         <!-- Trails tab -->
        <div class="tab-group" id="group-trail">
        <button class="tab-btn" id="tab-trail">
            TRAILS <span class="chevron">▲</span>
        </button>
        <div class="tray" id="tray-trail">
            <button class="tray-btn" id="btn-trails">ON</button>
            <button class="tray-btn active" id="btn-no-trails">OFF</button>
        </div>
        </div>

        <!-- Color tab -->
        <div class="tab-group" id="group-color">
        <button class="tab-btn" id="tab-color">
            COLOR <span class="chevron">▲</span>
        </button>
        <div class="tray" id="tray-color">
            <button class="tray-btn active" id="btn-intense">VIBE</button>
            <button class="tray-btn" id="btn-rainbow">RNBW</button>
            <button class="tray-btn" id="btn-super">SUPER</button>
            <input type="color" id="color-picker" value="#ffffff" title="PICK">
        </div>
        </div>

        <!-- Wave tab -->
        <div class="tab-group" id="group-wave">
            <button class="tab-btn" id="tab-wave">
                WAVE <span class="chevron">▲</span>
            </button>
            <div class="tray" id="tray-wave">
                <button class="tray-btn active" id="btn-normal">NORMAL</button>
                <button class="tray-btn" id="btn-bars">BAR</button>
                <button class="tray-btn" id="btn-fire">FIRE</button>
                <button class="tray-btn" id="btn-split">SPLIT</button>
            </div>
        </div>

        <!-- Background tab -->
        <div class="tab-group" id="group-back">
            <button class="tab-btn" id="tab-back">
                BACKGROUND <span class="chevron">▲</span>
            </button>
            <div class="tray" id="tray-back">
                <button class="tray-btn active" id="btn-default">DEFAULT</button>
                <button class="tray-btn" id="btn-space">SPACE</button>
                <button class="tray-btn" id="btn-warp">WARP</button>
                <button class="tray-btn" id="btn-ocean">OCEAN</button>
                <button class="tray-btn" id="btn-forest">FOREST</button>
            </div>
        </div>

        <!-- Slide tab -->
        <div class="tab-group" id="group-slide">
            <button class="tab-btn" id="tab-slide">
                SLIDE <span class="chevron">▲</span>
            </button>
            <div class="tray" id="tray-slide">
                <button class="tray-btn" id="btn-slide-on">ON</button>
                <button class="tray-btn active" id="btn-slide-off">OFF</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="audio/*" style="display:none">

    <script src="components/constants.js"></script>
    <script src="components/lightspeed.js"></script>
    <script src="components/planets.js"></script>
    <script src="components/ocean.js"></script>
    <script src="components/forest.js"></script>
    <script src="components/lrc-parser.js"></script>
    <script src="config.js"></script>
    <script src="components/lyrics.js"></script>
    <script src="components/fire.js"></script>
    <script src="components/wave.js"></script>
    <script src="sketch.js"></script>
</body>
</html>
